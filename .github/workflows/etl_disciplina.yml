name: ETL Copa 2026 — Disciplina

on:
  # Disparo MANUAL via botão no app Vercel (chama a GitHub API)
  workflow_dispatch:
    inputs:
      triggered_by:
        description: "Quem disparou (ex: vercel-app, manual)"
        required: false
        default: "manual"

jobs:
  scrape-and-load:
    name: Scraping FIFA + UPSERT Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}

    steps:
      - name: Log do disparador
        run: echo "Workflow disparado por ${{ github.event.inputs.triggered_by }}"

      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Instalar browsers do Playwright
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Executar scraper FIFA
        run: python fifa_scraper.py

      - name: Salvar CSV como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: disciplina-csv-${{ github.run_number }}
          path: Data_Site_Fifa/Data_Estatisticas_Players/disciplina_jogadores.csv
          retention-days: 7
